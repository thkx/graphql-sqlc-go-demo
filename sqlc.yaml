version: "2"

sql:
  - engine: "sqlite"
    schema: "internal/repository/sqlite/migrations"
    queries: "internal/repository/sqlite/queries"
    gen:
      go:
        package: "db"
        out: "internal/repository/sqlite/db"
        emit_interface: true
        emit_json_tags: true
        emit_empty_slices: true
  - engine: "postgresql"
    schema: "internal/repository/postgres/migrations"
    queries: "internal/repository/postgres/queries"
    gen:
      go:
        package: "db"
        out: "internal/repository/postgres/db"
        emit_interface: true
        emit_json_tags: true
        emit_empty_slices: true
